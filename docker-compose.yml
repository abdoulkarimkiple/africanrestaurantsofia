services:
  database:
    image: postgres:16-alpine
    container_name: africanrestaurantsofia-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-african_restaurant_sofia}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: africanrestaurantsofia-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      - database

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: africanrestaurantsofia-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: africanrestaurantsofia-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:

